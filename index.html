<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Menú Semanal">
<title>Menú Semanal Saludable</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f1a;display:flex;justify-content:center;padding:16px;min-height:100vh;font-family:system-ui,-apple-system,sans-serif;font-size:16px}
.app{max-width:480px;width:100%;background:#1a1a2e;border-radius:20px;padding:14px;padding-bottom:30px}

/* HEADER */
.app-header{background:#16213e;border-radius:14px;padding:14px 16px;margin-bottom:12px;border:0.5px solid #2a2a4a}
.app-header h1{font-size:20px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.app-header p{font-size:13px;color:#F0997B;margin-top:3px}

.alert-box{padding:10px 12px;border-radius:10px;background:#1e1a10;border:0.5px solid #EF9F27;font-size:13px;color:#EF9F27;margin-bottom:12px;line-height:1.5;display:flex;align-items:flex-start;gap:8px}

/* DAYS */
.section-label{font-size:13px;font-weight:600;color:#EF9F27;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.days-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.day-card{background:#16213e;border:1.5px solid #2a2a4a;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;transition:transform 0.1s}
.day-card:active{transform:scale(0.95)}
.day-card.gym{border-color:#EF9F27}
.day-card.done{border-color:#25D366}
.day-card.active-day{border-color:#D85A30;background:#2a1510}
.day-name{font-size:14px;font-weight:600;color:#fff}
.day-kcal{font-size:11px;color:#888;margin-top:2px}
.day-card.done .day-kcal{color:#25D366}
.day-sub{font-size:11px;margin-top:2px}

.divider{height:0.5px;background:#2a2a4a;margin:12px 0}

/* ACTIONS */
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.btn{padding:12px 8px;border-radius:12px;border:1px solid #2a2a4a;background:#16213e;font-size:14px;color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500;transition:transform 0.1s}
.btn:active{transform:scale(0.97)}
.btn-full{grid-column:1/-1}
.btn-orange{background:#D85A30;color:#fff;border-color:#D85A30}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}
.btn-yellow{background:#16213e;color:#EF9F27;border-color:#EF9F27}
.btn-danger{background:#2a1510;color:#F0997B;border-color:#D85A30}
.btn-small{padding:8px 12px;font-size:13px;border-radius:10px}

/* DAY PANEL */
.day-panel{display:none;margin-bottom:12px}
.day-panel.open{display:block}
.day-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-panel-title{font-size:19px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.day-stats{display:flex;gap:6px;margin-bottom:12px}
.stat-pill{flex:1;padding:7px 4px;border-radius:10px;background:#16213e;text-align:center;border:0.5px solid #2a2a4a}
.stat-pill .val{font-size:14px;font-weight:700;color:#EF9F27}
.stat-pill .lbl{font-size:10px;color:#666;margin-top:1px}

/* MEAL ACCORDION */
.meal-accordion{margin-bottom:8px;border-radius:14px;border:1px solid #2a2a4a;overflow:hidden;background:#16213e}
.meal-toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;background:#16213e}
.meal-toggle:active{background:#1e2a40}
.meal-toggle-left{display:flex;align-items:center;gap:10px}
.meal-icon{font-size:22px}
.meal-name{font-size:16px;font-weight:600;color:#fff}
.meal-kcal-small{font-size:12px;color:#888;margin-top:1px}
.meal-arrow{font-size:18px;color:#555;transition:transform 0.2s}
.meal-accordion.open .meal-arrow{transform:rotate(180deg)}
.meal-body{display:none;padding:0 14px 14px}
.meal-accordion.open .meal-body{display:block}

/* SELECTED DISH */
.dish-card{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;padding:12px;margin-bottom:10px}
.dish-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:8px}
.dish-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:14px;line-height:1.5}
.dish-row-label{color:#EF9F27;font-weight:600;white-space:nowrap}
.dish-row-val{color:#ccc}
.dish-row-val.bebida{color:#85B7EB}
.dish-row-val.postre{color:#F0997B}
.nutri-box{background:#1e1a10;border:1px solid #EF9F27;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin:10px 0 10px}
.nutri-icon{font-size:18px}
.nutri-vals{font-size:13px;color:#EF9F27;font-weight:600;line-height:1.6}
.nutri-label{font-size:11px;color:#888;margin-right:6px}

/* INGREDIENTS TABLE */
.ing-table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0 10px}
.ing-table td{padding:3px 0;vertical-align:top;color:#aaa}
.ing-table td:first-child{color:#ddd;width:58%}
.ing-table td:last-child{text-align:right;color:#EF9F27;font-weight:600}

/* CHANGE BUTTON */
.change-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;border:1px solid #2a2a4a;background:#16213e;font-size:14px;color:#ccc;cursor:pointer;font-weight:500;width:100%}
.change-btn:active{transform:scale(0.98)}

/* SHOP SECTION */
.shop-panel{background:#16213e;border-radius:14px;border:1px solid #2a2a4a;padding:14px;margin-top:10px}
.shop-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.shop-panel-title{font-size:16px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.shop-day-selector{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.shop-day-btn{padding:7px 12px;border-radius:10px;border:1px solid #2a2a4a;background:#1a1a2e;font-size:13px;color:#aaa;cursor:pointer;font-weight:500}
.shop-day-btn:active{transform:scale(0.97)}
.shop-day-btn.selected{background:#D85A30;color:#fff;border-color:#D85A30}
.shop-cat-label{font-size:12px;font-weight:600;color:#EF9F27;text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 4px;display:flex;align-items:center;gap:6px}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid #2a2a4a;font-size:14px;color:#ccc}
.shop-item-left{display:flex;align-items:center;gap:8px}
.shop-item i{color:#D85A30}
.shop-qty{font-size:13px;color:#EF9F27;font-weight:600}

/* CONSEJOS MODAL */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#16213e;border:1px solid #2a2a4a;border-radius:20px;width:100%;max-width:480px;padding:16px;margin:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-title{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:#888;font-size:30px;cursor:pointer;line-height:1;padding:0}
.tip-highlight{padding:10px 12px;background:#2a1510;border-radius:10px;border:1px solid #D85A30;font-size:13px;color:#F0997B;line-height:1.5;margin-bottom:12px}
.frase-card{padding:16px;background:#1a1a2e;border-radius:12px;border:1px solid #EF9F27;margin-bottom:14px;text-align:center}
.frase-text{font-size:15px;color:#fff;line-height:1.7;font-style:italic}
.frase-autor{font-size:12px;color:#EF9F27;margin-top:6px}
.tip-cat-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;padding:10px 12px;background:#1a1a2e;border-radius:10px;margin-bottom:6px;border:1px solid #2a2a4a}
.tip-block{background:#1a1a2e;border-radius:10px;border:1px solid #2a2a4a;overflow:hidden;margin-bottom:10px}
.tip-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:0.5px solid #2a2a4a;font-size:14px;color:#ccc;line-height:1.5}
.tip-item:last-child{border-bottom:none}
.tip-item i{font-size:16px;margin-top:1px;flex-shrink:0}
.tip-item.good i{color:#25D366}
.tip-item.bad i{color:#D85A30}
.tip-item.warn i{color:#EF9F27}
.tip-item.star i{color:#EF9F27}

/* PWA install banner */
.install-bar{display:none;background:#16213e;border:1px solid #EF9F27;border-radius:12px;padding:10px 14px;margin-bottom:12px;align-items:center;justify-content:space-between;gap:8px}
.install-bar.show{display:flex}
.install-bar-text{font-size:13px;color:#ccc;flex:1}
.install-bar-text strong{color:#EF9F27}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1><i class="ti ti-salad" style="color:#D85A30"></i>Menú Semanal</h1>
    <p>Bajo sodio · bajo IG · cantidades reales</p>
  </div>

  <div id="installBar" class="install-bar">
    <div class="install-bar-text"><strong>📲 Instalar app</strong> — Añádela a tu pantalla de inicio</div>
    <button class="btn btn-orange btn-small" onclick="installApp()">Instalar</button>
    <button class="btn btn-small" onclick="document.getElementById('installBar').classList.remove('show')" style="padding:8px">✕</button>
  </div>

  <div class="alert-box"><i class="ti ti-alert-triangle"></i><span>Guía orientativa. Consulta siempre a tu médico o dietista.</span></div>

  <p class="section-label">Selecciona un día</p>
  <div class="days-grid" id="daysGrid"></div>

  <!-- DAY PANEL -->
  <div class="day-panel" id="dayPanel">
    <div class="day-panel-header">
      <div class="day-panel-title" id="dayPanelTitle"></div>
      <button class="btn btn-small" onclick="closeDay()" style="padding:8px 12px"><i class="ti ti-x"></i></button>
    </div>
    <div class="day-stats" id="dayStats"></div>
    <div id="mealsContainer"></div>
    <button class="btn btn-small" onclick="randomDay(currentDay)" style="width:100%;margin-top:4px"><i class="ti ti-refresh"></i> Nuevo menú para este día</button>
  </div>

  <div class="divider"></div>
  <p class="section-label">Acciones</p>
  <div class="actions-grid">
    <button class="btn" onclick="resetWeek()"><i class="ti ti-rotate"></i> Nueva semana</button>
    <button class="btn btn-wa" onclick="shareWhatsApp()"><i class="ti ti-brand-whatsapp"></i> WhatsApp</button>
    <button class="btn btn-yellow btn-full" onclick="openConsejos()"><i class="ti ti-bulb"></i> Consejos · motivación · hábitos</button>
    <button class="btn btn-orange btn-full" onclick="toggleShop()"><i class="ti ti-shopping-cart"></i> Lista de compra por día</button>
  </div>

  <!-- SHOP PANEL -->
  <div id="shopPanel" style="display:none">
    <div class="shop-panel">
      <div class="shop-panel-header">
        <div class="shop-panel-title"><i class="ti ti-shopping-cart" style="color:#D85A30"></i>Lista de compra</div>
        <button class="btn btn-danger btn-small" onclick="toggleShop()"><i class="ti ti-x"></i></button>
      </div>
      <p style="font-size:13px;color:#888;margin-top:4px">Selecciona el día que quieres preparar:</p>
      <div class="shop-day-selector" id="shopDaySelector"></div>
      <div id="shopList"></div>
    </div>
  </div>
</div>

<!-- CONSEJOS OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

function randomMenu(){
  const p={};
  comidas.forEach(c=>{const s=[...menus[c]].sort(()=>Math.random()-0.5);p[c]={options:s,selected:0};});
  const pg=[...postGym].sort(()=>Math.random()-0.5);
  p.postgym={options:pg,selected:0};
  return p;
}

function initWeek(){
  weekPlan=dias.map(()=>randomMenu());
  openMeals={};
  currentDay=-1;
  renderDays();
  document.getElementById('dayPanel').classList.remove('open');
  document.getElementById('shopPanel').style.display='none';
  document.getElementById('shopList').innerHTML='';
}

function totalKcalDay(p){return comidas.reduce((s,c)=>s+kcalFromIng(p[c].options[p[c].selected].ings),0);}
function totalProtDay(p){return comidas.reduce((s,c)=>s+protFromIng(p[c].options[p[c].selected].ings),0);}
function totalCarbDay(p){return comidas.reduce((s,c)=>s+carbFromIng(p[c].options[p[c].selected].ings),0);}
function totalFatDay(p){return comidas.reduce((s,c)=>s+fatFromIng(p[c].options[p[c].selected].ings),0);}

function renderDays(){
  document.getElementById('daysGrid').innerHTML=dias.map((d,i)=>{
    const k=totalKcalDay(weekPlan[i]);const isGym=diasGym.includes(i);
    return `<div class="day-card ${isGym?'gym':''} ${i===currentDay?'active-day':''}" onclick="selectDay(${i})">
      <div class="day-name">${d.substring(0,3)}</div>
      <div class="day-kcal">${k} kcal</div>
      <div class="day-sub" style="color:${isGym?'#EF9F27':'transparent'}">${isGym?'🏋️':'-'}</div>
    </div>`;
  }).join('');
}

function selectDay(di){
  currentDay=di;
  renderDays();
  renderDayPanel(di);
  document.getElementById('dayPanel').classList.add('open');
  document.getElementById('dayPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function closeDay(){
  currentDay=-1;
  document.getElementById('dayPanel').classList.remove('open');
  renderDays();
}

function renderDayPanel(di){
  const p=weekPlan[di];const isGym=diasGym.includes(di);
  const k=totalKcalDay(p),pr=totalProtDay(p),ca=totalCarbDay(p),fa=totalFatDay(p);
  document.getElementById('dayPanelTitle').innerHTML=`${isGym?'🏋️ ':''}Menú del ${dias[di]}`;
  document.getElementById('dayStats').innerHTML=`
    <div class="stat-pill"><div class="val">${k}</div><div class="lbl">Kcal</div></div>
    <div class="stat-pill"><div class="val">${pr}g</div><div class="lbl">Proteína</div></div>
    <div class="stat-pill"><div class="val">${ca}g</div><div class="lbl">Carbos</div></div>
    <div class="stat-pill"><div class="val">${fa}g</div><div class="lbl">Grasas</div></div>`;

  const allComidas=[...comidas];
  if(isGym) allComidas.splice(1,0,'postgym');

  document.getElementById('mealsContainer').innerHTML=allComidas.map(c=>{
    const isPost=c==='postgym';
    const mLabel=isPost?'🏋️ Post-Gimnasio (11h-11:30h)':iconos[c]+' '+labels[c];
    const sel=p[c].selected;
    const opt=p[c].options[sel];
    const kcal=kcalFromIng(opt.ings);
    const prot=protFromIng(opt.ings);
    const carb=carbFromIng(opt.ings);
    const fat=fatFromIng(opt.ings);
    const isOpen=openMeals[c]||false;
    return `<div class="meal-accordion ${isOpen?'open':''}" id="meal_${di}_${c}">
      <div class="meal-toggle" onclick="toggleMeal(${di},'${c}')">
        <div class="meal-toggle-left">
          <span class="meal-icon">${isPost?'🏋️':iconos[c]}</span>
          <div>
            <div class="meal-name">${isPost?'Post-Gimnasio':labels[c]}</div>
            <div class="meal-kcal-small">${opt.name.substring(0,28)}${opt.name.length>28?'…':''} · ${kcal} kcal</div>
          </div>
        </div>
        <i class="ti ti-chevron-down meal-arrow"></i>
      </div>
      <div class="meal-body">
        <div class="dish-card">
          <div class="dish-title">${opt.name}</div>
          <table class="ing-table">
            ${opt.ings.map(i=>`<tr><td>${i.n}</td><td>${i.g}${i.u}</td><td>${Math.round(i.kcal100*i.g/100)} kcal</td></tr>`).join('')}
          </table>
          <div class="dish-row"><span class="dish-row-label">💧 Bebida:</span><span class="dish-row-val bebida">${opt.bebida}</span></div>
          ${opt.postre&&!isPost?`<div class="dish-row"><span class="dish-row-label">🍮 Postre:</span><span class="dish-row-val postre">${opt.postre}</span></div>`:''}
          <div class="nutri-box">
            <span class="nutri-icon">📊</span>
            <div><div class="nutri-label">VALOR NUTRICIONAL</div>
            <div class="nutri-vals">Cal: ${kcal} | Prot: ${prot}g | HC: ${carb}g | Grasas: ${fat}g</div></div>
          </div>
        </div>
        <button class="change-btn" onclick="changeOption(${di},'${c}')">
          <i class="ti ti-refresh" style="color:#EF9F27"></i> Cambiar Opción
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleMeal(di,c){
  openMeals[c]=!openMeals[c];
  const el=document.getElementById(`meal_${di}_${c}`);
  el.classList.toggle('open');
}

function changeOption(di,c){
  const p=weekPlan[di];
  const total=p[c].options.length;
  const next=(p[c].selected+1)%total;
  if(next===0){
    showToast('🔄 Has visto todas las opciones, volviendo al principio');
  }
  p[c].selected=next;
  openMeals[c]=true;
  renderDayPanel(di);
  renderDays();
}

function showToast(msg){
  const t=document.getElementById('toast-msg');
  if(!t){
    const d=document.createElement('div');
    d.id='toast-msg';
    d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#D85A30;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s';
    d.textContent=msg;
    document.body.appendChild(d);
    setTimeout(()=>d.style.opacity='1',10);
    setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),300);},3000);
  }
}

function randomDay(di){weekPlan[di]=randomMenu();openMeals={};renderDayPanel(di);renderDays();}

  const panel=document.getElementById('shopPanel');
  if(panel.style.display==='none'){
    panel.style.display='block';
    renderShopSelector();
    panel.scrollIntoView({behavior:'smooth'});
  } else {
    panel.style.display='none';
  }
}

function renderShopSelector(){
  document.getElementById('shopDaySelector').innerHTML=dias.map((d,i)=>
    `<button class="shop-day-btn" onclick="buildShopForDay(${i})">${d.substring(0,3)}</button>`
  ).join('');
  document.getElementById('shopList').innerHTML='<p style="font-size:13px;color:#666;padding:10px 0">👆 Toca un día para ver su lista</p>';
}

function buildShopForDay(di){
  document.querySelectorAll('.shop-day-btn').forEach((b,i)=>b.classList.toggle('selected',i===di));
  const shopItems={};
  const allC=[...comidas];
  if(diasGym.includes(di)) allC.push('postgym');
  allC.forEach(c=>{
    const o=weekPlan[di][c].options[weekPlan[di][c].selected];
    o.ings.forEach(ing=>{
      const k=ing.n;
      if(!shopItems[k])shopItems[k]={g:0,u:ing.u};
      shopItems[k].g+=ing.g;
    });
  });

  const cats={
    proteinas:{label:'Proteínas',icon:'ti-meat',words:['pollo','pavo','merluza','salmón','bacalao','sardinas','dorada','huevo','cottage']},
    lacteos:{label:'Lácteos',icon:'ti-droplet',words:['yogur','kéfir','queso','leche']},
    verduras:{label:'Verduras',icon:'ti-leaf',words:['espinacas','brócoli','calabacín','pimientos','tomate','pepino','zanahoria','espárragos','champiñones','cebolla','rúcula','calabaza','judías','lechuga','verduras']},
    frutas:{label:'Frutas',icon:'ti-apple',words:['manzana','naranja','pera','mandarina','kiwi','fresas','arándanos','ciruelas','limón']},
    cereales:{label:'Cereales y legumbres',icon:'ti-grain',words:['avena','arroz','quinoa','lentejas','pasta','pan','tortita','boniato','patata']},
    grasas:{label:'Grasas saludables',icon:'ti-fish',words:['aguacate','nueces','almendras','hummus','semillas','lino','aove']},
    otros:{label:'Otros',icon:'ti-package',words:['gelatina','canela','caldo']},
  };

  const assigned=new Set();let html=`<p style="font-size:14px;font-weight:600;color:#fff;margin:8px 0 4px">Lista para el <span style="color:#D85A30">${dias[di]}</span>${diasGym.includes(di)?' 🏋️':''}</p>`;
  Object.values(cats).forEach(cat=>{
    const matching=Object.entries(shopItems).filter(([k])=>cat.words.some(w=>k.toLowerCase().includes(w))&&!assigned.has(k));
    if(!matching.length)return;
    matching.forEach(([k])=>assigned.add(k));
    html+=`<div class="shop-cat-label"><i class="ti ${cat.icon}"></i>${cat.label}</div>`;
    html+=matching.map(([k,v])=>`<div class="shop-item"><div class="shop-item-left"><i class="ti ti-circle-check"></i>${k}</div><span class="shop-qty">${v.g}${v.u}</span></div>`).join('');
  });
  document.getElementById('shopList').innerHTML=html;
}

function resetWeek(){closeDay();initWeek();}

function shareWhatsApp(){
  let txt='*Mi menú semanal saludable*\n\n';
  dias.forEach((d,di)=>{
    txt+=`*${d}*${diasGym.includes(di)?' 🏋️':''}\n`;
    comidas.forEach(c=>{
      const o=weekPlan[di][c].options[weekPlan[di][c].selected];
      txt+=`• ${labels[c]}: ${o.name} (${kcalFromIng(o.ings)} kcal)\n`;
      if(o.bebida)txt+=`  💧 ${o.bebida}\n`;
      if(o.postre)txt+=`  🍮 ${o.postre}\n`;
    });
    if(diasGym.includes(di)){const o=weekPlan[di].postgym.options[weekPlan[di].postgym.selected];txt+=`• 🏋️ Post-gym: ${o.name}\n`;}
    txt+='\n';
  });
  txt+='_Plan de pérdida de peso personalizado_ 💪';
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function openConsejos(){
  const frase=frases[Math.floor(Math.random()*frases.length)];
  document.getElementById('modal').innerHTML=`
    <div class="modal-header">
      <div class="modal-title">💡 Consejos y motivación</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="tip-highlight">👤 Perfil: 64 años · 108 kg · Gym L/M/V · Pérdida de grasa</div>
    <div class="frase-card"><div class="frase-text">"${frase.text}"</div><div class="frase-autor">— ${frase.autor}</div></div>
    ${consejos.map(sec=>`
      <div class="tip-cat-title" style="color:${sec.color}">${sec.icon} ${sec.cat}</div>
      <div class="tip-block">${sec.items.map(it=>`<div class="tip-item ${it.type}"><i class="ti ${it.icon}"></i><span>${it.text}</span></div>`).join('')}</div>`).join('')}
    <button class="btn btn-orange btn-full" onclick="closeModal()" style="margin-top:6px">✅ Entendido, a por ello</button>`;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBar').classList.add('show');
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.choosenChoice=true;
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBar').classList.remove('show');});}
}
window.addEventListener('appinstalled',()=>document.getElementById('installBar').classList.remove('show'));

initWeek();
